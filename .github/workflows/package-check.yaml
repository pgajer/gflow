name: package-check

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: package-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  make-check:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check
          dependencies: '"hard"'
          extra-packages: any::devtools

      - uses: r-lib/actions/setup-tinytex@v2

      - name: Install HTML Tidy
        run: sudo apt-get update && sudo apt-get install -y tidy

      - name: Run full CRAN-style check via Makefile
        env:
          # CI does not install the full Suggests set; optional examples/tests are
          # already guarded where those packages are needed.
          _R_CHECK_FORCE_SUGGESTS_: "false"
        run: make check
