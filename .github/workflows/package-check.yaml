name: package-check

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: package-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  make-check:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check
          dependencies: '"hard"'
          extra-packages: |
            any::devtools
            any::remotes

      - name: Install grip (non-CRAN suggested dependency)
        run: |
          Rscript -e 'remotes::install_github("pgajer/grip", dependencies = TRUE, upgrade = "never"); if (!requireNamespace("grip", quietly = TRUE)) stop("Missing package: grip")'

      - name: Install malo (non-CRAN suggested dependency)
        run: |
          Rscript -e 'remotes::install_github("pgajer/malo", dependencies = TRUE, upgrade = "never"); if (!requireNamespace("malo", quietly = TRUE)) stop("Missing package: malo")'

      - name: Run full CRAN-style check via Makefile
        run: make check
